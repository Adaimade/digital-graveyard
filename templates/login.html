{% extends 'layout.html' %}

{% block content %}
<h2>Enter the Graveyard</h2>
<p>Re-identify yourself to visit the fallen.</p>
<form method="POST">
    <div class="field">
        <label for="custom_id">Custom ID:</label>
        <span class="hint">💡 Tip: Your GitHub username if you registered with it.</span>
        <input type="text" id="custom_id" name="custom_id" required>
    </div>
    <div class="field">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
    </div>
    <button type="submit">Login 🕯️</button>
</form>
{% endblock %}
